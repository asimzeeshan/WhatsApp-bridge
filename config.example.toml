[bridge]
addr = "127.0.0.1:8080"
data_dir = "./data"
log_level = "info"
cooldown_minutes = 10

[bridge.database]
driver = "sqlite"                     # "sqlite" (default) or "postgres"
# dsn = "postgres://bridge:YOUR_PASSWORD@localhost:5432/whatsapp?sslmode=disable"  # Only for postgres

[bridge.ratelimit]
messages_per_second = 0.5
burst = 3
jitter_ms = 500

[bridge.media]
auto_download_images = true       # Auto-download images from all groups and DMs
image_output_dir = "./media/images"
auto_download_audio = true        # Auto-download voice notes and audio from all groups and DMs
audio_output_dir = "./media/audio"
max_file_size_mb = 50
log_all_media = true              # Log all media (images, videos, audio, docs, stickers) as searchable DB entries

[bridge.transcription]
enabled = true
whisper_url = "http://127.0.0.1:8443/v1/audio/transcriptions"
model = "Systran/faster-whisper-medium"
language = ""                     # Empty = auto-detect (handles Urdu/English code-switching)

[bridge.monitoring]
watched_group_jids = [
    # "123456789012345678@g.us",
]

[mcp]
bridge_url = "http://127.0.0.1:8080"
health_check_attempts = 5
health_check_delay_seconds = 2

[dashboard]
addr = "127.0.0.1:9090"
db_path = "./data/whatsapp.db"
