<h2>Today's Telemetry</h2>
<div class="stat">
    <span class="stat-label">Messages Received</span>
    <span class="stat-value">{{ telemetry.messages_received }}</span>
</div>
<div class="stat">
    <span class="stat-label">Messages Sent</span>
    <span class="stat-value">{{ telemetry.messages_sent }}</span>
</div>
<div class="stat">
    <span class="stat-label">Media Downloaded</span>
    <span class="stat-value">{{ telemetry.media_downloaded }}</span>
</div>
<div class="stat">
    <span class="stat-label">Media Sent</span>
    <span class="stat-value">{{ telemetry.media_sent }}</span>
</div>
<div class="stat">
    <span class="stat-label">Links Indexed</span>
    <span class="stat-value">{{ telemetry.links_indexed }}</span>
</div>
